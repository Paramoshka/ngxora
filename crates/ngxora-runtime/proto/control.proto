syntax = "proto3";

package ngxora.control.v1;
option go_package = "github.com/paramoshka/ngxora/sdk/go/ngxora/control/v1;controlv1";

service ControlPlane {
  rpc ApplySnapshot(ConfigSnapshot) returns (ApplyResult);
  rpc GetSnapshot(GetSnapshotRequest) returns (ConfigSnapshot);
}

message GetSnapshotRequest {}

message ApplyResult {
  bool applied = 1;
  bool restart_required = 2;
  string message = 3;
  string active_version = 4;
  uint64 active_generation = 5;
}

message ConfigSnapshot {
  string version = 1;
  HttpOptions http = 2;
  repeated Listener listeners = 3;
  repeated VirtualHost virtual_hosts = 4;
  repeated UpstreamGroup upstreams = 5;
}

message HttpOptions {
  uint64 downstream_keepalive_timeout_seconds = 1;
  bool tcp_nodelay = 2;
  uint32 keepalive_requests = 3;
  bool allow_connect_method_proxying = 4;
  bool h2c = 5;
  uint64 client_max_body_size_bytes = 6;
}

message Listener {
  string name = 1;
  string address = 2;
  uint32 port = 3;
  bool tls = 4;
  bool http2 = 5;
  bool http2_only = 6;
  ListenerTlsOptions tls_options = 7;
}

message ListenerTlsOptions {
  TlsProtocolVersion min_protocol = 1;
  TlsProtocolVersion max_protocol = 2;
  TlsVerifyClient verify_client = 3;
  PemSource client_certificate = 4;
}

message VirtualHost {
  string listener = 1;
  repeated string server_names = 2;
  bool default_server = 3;
  TlsBinding tls = 4;
  repeated Route routes = 5;
}

message TlsBinding {
  PemSource cert = 1;
  PemSource key = 2;
}

message PemSource {
  oneof source {
    string path = 1;
    string inline_pem = 2;
  }
}

message Route {
  Match match = 1;
  Upstream upstream = 2;
  RouteTimeouts timeouts = 3;
  repeated Plugin plugins = 4;
  UpstreamTlsOptions tls_options = 5;
}

message RouteTimeouts {
  uint64 connect_timeout_ms = 1;
  uint64 read_timeout_ms = 2;
  uint64 write_timeout_ms = 3;
}

message UpstreamTlsOptions {
  Switch verify = 1;
  PemSource trusted_certificate = 2;
}

message Plugin {
  string name = 1;
  string json_config = 2;
}

message Match {
  oneof kind {
    string prefix = 1;
    string exact = 2;
    string prefer_prefix = 3;
    Regex regex = 4;
    string named = 5;
  }
}

message Regex {
  string pattern = 1;
  bool case_insensitive = 2;
}

message Upstream {
  string scheme = 1;
  string host = 2;
  uint32 port = 3;
  string upstream_group = 4;
}

message UpstreamGroup {
  string name = 1;
  repeated UpstreamBackend backends = 2;
  UpstreamSelectionPolicy policy = 3;
  UpstreamHealthCheck health_check = 4;
}

message UpstreamBackend {
  string host = 1;
  uint32 port = 2;
}

message UpstreamHealthCheck {
  oneof kind {
    UpstreamTcpHealthCheck tcp = 1;
    UpstreamHttpHealthCheck http = 2;
  }
  uint64 timeout_ms = 3;
  uint64 interval_ms = 4;
  uint32 consecutive_success = 5;
  uint32 consecutive_failure = 6;
}

message UpstreamTcpHealthCheck {}

message UpstreamHttpHealthCheck {
  string host = 1;
  string path = 2;
  bool use_tls = 3;
}

enum UpstreamSelectionPolicy {
  UPSTREAM_SELECTION_POLICY_UNSPECIFIED = 0;
  UPSTREAM_SELECTION_POLICY_ROUND_ROBIN = 1;
  UPSTREAM_SELECTION_POLICY_RANDOM = 2;
}

enum TlsProtocolVersion {
  TLS_PROTOCOL_VERSION_UNSPECIFIED = 0;
  TLS_PROTOCOL_VERSION_TLS1 = 1;
  TLS_PROTOCOL_VERSION_TLS1_2 = 2;
  TLS_PROTOCOL_VERSION_TLS1_3 = 3;
}

enum TlsVerifyClient {
  TLS_VERIFY_CLIENT_UNSPECIFIED = 0;
  TLS_VERIFY_CLIENT_OFF = 1;
  TLS_VERIFY_CLIENT_OPTIONAL = 2;
  TLS_VERIFY_CLIENT_REQUIRED = 3;
}

enum Switch {
  SWITCH_UNSPECIFIED = 0;
  SWITCH_ON = 1;
  SWITCH_OFF = 2;
}
