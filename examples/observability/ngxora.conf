# ngxora config for OpenTelemetry / Prometheus demo stack.
# Uses `backend:80` — the Docker Compose service name — as upstream.
http {
    keepalive_timeout 30s;
    keepalive_requests 1000;

    # Cache some responses to observe cache metrics/traces.
    proxy_cache_max_size 100m;

    server {
        listen 8080 default_server;
        server_name localhost;

        # Cache this location to see cache hit/miss in traces.
        location /cached/ {
            proxy_cache on;
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            proxy_write_timeout 15s;
            headers {
                response_add X-Cacheable true;
            }
            proxy_pass http://backend:80;
        }

        location / {
            proxy_connect_timeout 3s;
            proxy_read_timeout 30s;
            proxy_write_timeout 30s;
            proxy_pass http://backend:80;
        }
    }
}
