http {
    upstream demo_pool {
        policy round_robin;
        server backend-1:80;
        server backend-2:80;

        # Uncomment to enable active health checks for the pool.
        # health_check {
        #     type http;
        #     # Used for HTTP Host header only; backend selection still comes
        #     # from the server lines above.
        #     host localhost;
        #     path /;
        #     use_tls off;
        #     timeout 1s;
        #     interval 5s;
        #     consecutive_success 1;
        #     consecutive_failure 2;
        # }
    }

    server {
        listen 8080 default_server;
        server_name localhost;

        location / {
            headers {
                response_add X-Upstream-Pool demo_pool;
                response_add X-Proxy ngxora;
            }
            proxy_pass http://demo_pool;
        }
    }
}
