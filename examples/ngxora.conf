http {
    # Live-applied request body limit. `0` means unlimited.
    client_max_body_size 10m;
    # Live-applied session option.
    keepalive_timeout 30s;
    # Bootstrap transport options.
    keepalive_requests 1000;
    allow_connect_method_proxying off;
    # Turn this on if you want plaintext downstream HTTP/2 or gRPC (h2c).
    h2c off;
    tcp_nodelay on;

    upstream api_pool {
        # Optional: policy random;
        server 127.0.0.1:9001;
        server 127.0.0.1:9002;
    }

    server {
        listen 8080 default_server;
        server_name localhost;

        location = /healthz {
            proxy_connect_timeout 1s;
            proxy_read_timeout 2s;
            proxy_write_timeout 2s;
            proxy_pass http://127.0.0.1:9000;
        }

        location /api/ {
            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            proxy_write_timeout 15s;
            rate-limit {
                rate 50;
            }
            cors {
                allow_origin "*";
                allow_methods "GET, POST, OPTIONS";
                allow_credentials on;
                max_age 86400;
            }
            headers {
                request_set X-Proxy-Route api;
                upstream_request_add X-From-Proxy ngxora;
                response_add X-Served-By ngxora;
            }
            proxy_pass http://api_pool;
        }

        location /ws/ {
            # Classic WebSocket upgrade works with plain proxy_pass.
            # No extra Upgrade/Connection rewrite is required.
            proxy_connect_timeout 3s;
            proxy_read_timeout 1h;
            proxy_write_timeout 1h;
            proxy_pass http://127.0.0.1:9200;
        }

        location / {
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_write_timeout 30s;
            headers {
                response_add X-Proxy ngxora;
            }
            proxy_pass http://example.com;
        }
    }

    # Shared listener, separated later by Host routing.
    server {
        listen 8080;
        server_name admin.localhost;

        location / {
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
            proxy_write_timeout 10s;
            # Build with `plugin-basic-auth` to protect the admin surface.
            # `make build-bin` already enables plugins from `plugins.cfg`.
            #
            # basic_auth {
            #     username admin;
            #     password change-me;
            #     realm Admin Area;
            # }
            rate-limit {
                rate 3;
            }
            proxy_pass http://127.0.0.1:9100;
        }
    }
}
