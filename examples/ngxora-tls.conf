http {
    keepalive_timeout 60s;
    keepalive_requests 1000;
    allow_connect_method_proxying off;
    h2c off;
    tcp_nodelay on;

    upstream tls_app_pool {
        # Optional: policy random;
        server 127.0.0.1:8443;
        server 127.0.0.1:9443;
    }

    # Shared :443 listener with per-domain certificate selection by SNI.
    # Replace the certificate paths before using this file to run the proxy.
    server {
        listen 0.0.0.0:443 ssl http2 default_server;
        server_name example.com www.example.com;

        ssl_certificate /etc/ngxora/tls/example.crt;
        ssl_certificate_key /etc/ngxora/tls/example.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_connect_timeout 3s;
            proxy_read_timeout 20s;
            proxy_write_timeout 20s;
            proxy_pass https://tls_app_pool;
        }
    }

    server {
        listen 0.0.0.0:443 ssl http2;
        server_name api.example.com;

        ssl_certificate /etc/ngxora/tls/api.crt;
        ssl_certificate_key /etc/ngxora/tls/api.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
            proxy_write_timeout 10s;
            # Upstream TLS verification example:
            #
            # proxy_ssl_verify on;
            # proxy_ssl_trusted_certificate /etc/ngxora/tls/upstream-ca.pem;
            #
            # For local/self-signed labs you can temporarily disable verification:
            #
            # proxy_ssl_verify off;
            # Optional HTTP auth gate in front of the TLS-protected API.
            #
            # basic_auth {
            #     username api-user;
            #     password change-me;
            #     realm API Access;
            # }
            proxy_pass https://127.0.0.1:9443;
        }
    }

    # Separate listener for downstream mTLS policy.
    server {
        listen 0.0.0.0:8444 ssl http2;
        server_name mtls.example.com;

        ssl_certificate /etc/ngxora/tls/mtls.crt;
        ssl_certificate_key /etc/ngxora/tls/mtls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_verify_client optional;
        ssl_client_certificate /etc/ngxora/tls/client-ca.pem;

        location / {
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_write_timeout 30s;
            # You can also layer basic auth on top of downstream mTLS.
            #
            # basic_auth {
            #     username ops;
            #     password change-me;
            #     realm MTLS Admin;
            # }
            proxy_pass https://127.0.0.1:10443;
        }
    }
}
