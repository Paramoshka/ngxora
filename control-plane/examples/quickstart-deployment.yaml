apiVersion: v1
kind: ServiceAccount
metadata:
  name: ngxora-control-plane
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ngxora-control-plane
rules:
  - apiGroups: [""]
    resources: ["services", "secrets", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "gatewayclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways/status", "httproutes/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["plugins.ngxora.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ngxora-control-plane
subjects:
  - kind: ServiceAccount
    name: ngxora-control-plane
    namespace: default
roleRef:
  kind: ClusterRole
  name: ngxora-control-plane
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ngxora-bootstrap
  namespace: default
data:
  ngxora.conf: |
    http {
        keepalive_timeout 30s;
        tcp_nodelay on;

        server {
            listen 8080 default_server;
            listen 8443 ssl default_server;
            server_name localhost;

            ssl_certificate /etc/ngxora/tls/tls.crt;
            ssl_certificate_key /etc/ngxora/tls/tls.key;

            location / {
                proxy_pass http://example-svc.default.svc.cluster.local:8080;
            }
        }
    }
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: ngxora-local
spec:
  controllerName: ngxora.dev/control-plane
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ngxora
  namespace: default
spec:
  gatewayClassName: ngxora-local
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      hostname: localhost
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
          - kind: HTTPRoute
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: localhost
      tls:
        mode: Terminate
        certificateRefs:
          - name: ngxora-localhost-tls
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
          - kind: HTTPRoute
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-svc
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-svc
  template:
    metadata:
      labels:
        app: example-svc
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=served-by-example-svc
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: example-svc
  namespace: default
spec:
  selector:
    app: example-svc
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngxora
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ngxora
  template:
    metadata:
      labels:
        app: ngxora
    spec:
      serviceAccountName: ngxora-control-plane
      volumes:
        - name: ngxora-config
          configMap:
            name: ngxora-bootstrap
        - name: ngxora-runtime
          emptyDir: {}
        - name: ngxora-tls
          secret:
            secretName: ngxora-localhost-tls
      containers:
        - name: ngxora
          image: paramoshka/ngxora:main
          args:
            - --grpc-uds
            - /var/run/ngxora/control.sock
            - /etc/ngxora/ngxora.conf
          ports:
            - containerPort: 8080
            - containerPort: 8443
          volumeMounts:
            - name: ngxora-config
              mountPath: /etc/ngxora
              readOnly: true
            - name: ngxora-runtime
              mountPath: /var/run/ngxora
            - name: ngxora-tls
              mountPath: /etc/ngxora/tls
              readOnly: true
        - name: ngxora-control-plane
          image: paramoshka/ngxora-control-plane:main
          env:
            - name: NGXORA_SOCKET_PATH
              value: /var/run/ngxora/control.sock
            - name: NGXORA_WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NGXORA_GATEWAY_NAME
              value: ngxora
            - name: NGXORA_GATEWAY_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NGXORA_APPLY_TIMEOUT
              value: 5s
            - name: NGXORA_RECONCILE_TIMEOUT
              value: 10s
          volumeMounts:
            - name: ngxora-runtime
              mountPath: /var/run/ngxora
---
apiVersion: v1
kind: Service
metadata:
  name: ngxora
  namespace: default
spec:
  selector:
    app: ngxora
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: https
      port: 8443
      targetPort: 8443
