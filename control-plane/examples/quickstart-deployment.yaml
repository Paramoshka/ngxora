apiVersion: v1
kind: ConfigMap
metadata:
  name: ngxora-bootstrap
  namespace: default
data:
  ngxora.conf: |
    http {
        keepalive_timeout 30s;
        tcp_nodelay on;

        server {
            listen 8080 default_server;
            server_name localhost;

            location / {
                proxy_pass http://example-svc.default.svc.cluster.local:8080;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-svc
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-svc
  template:
    metadata:
      labels:
        app: example-svc
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=served-by-example-svc
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: example-svc
  namespace: default
spec:
  selector:
    app: example-svc
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngxora
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ngxora
  template:
    metadata:
      labels:
        app: ngxora
    spec:
      volumes:
        - name: ngxora-config
          configMap:
            name: ngxora-bootstrap
        - name: ngxora-runtime
          emptyDir: {}
      containers:
        - name: ngxora
          image: paramoshka/ngxora:main
          args:
            - --grpc-uds
            - /var/run/ngxora/control.sock
            - /etc/ngxora/ngxora.conf
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: ngxora-config
              mountPath: /etc/ngxora
              readOnly: true
            - name: ngxora-runtime
              mountPath: /var/run/ngxora
        - name: ngxora-control-plane
          image: paramoshka/ngxora-control-plane:main
          env:
            - name: NGXORA_SOCKET_PATH
              value: /var/run/ngxora/control.sock
            - name: NGXORA_WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NGXORA_APPLY_TIMEOUT
              value: 5s
            - name: NGXORA_RECONCILE_TIMEOUT
              value: 10s
          volumeMounts:
            - name: ngxora-runtime
              mountPath: /var/run/ngxora
---
apiVersion: v1
kind: Service
metadata:
  name: ngxora
  namespace: default
spec:
  selector:
    app: ngxora
  ports:
    - name: http
      port: 8080
      targetPort: 8080
