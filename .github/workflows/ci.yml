name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_REPO: paramoshka/ngxora
  CONTROL_PLANE_IMAGE_REPO: paramoshka/ngxora-control-plane
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  TAG: ${{ github.ref_name }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake pkg-config libssl-dev ca-certificates

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          setup-envtest use --bin-dir /home/runner/.local/kubebuilder

      - name: Set KUBEBUILDER_ASSETS
        run: |
          echo "KUBEBUILDER_ASSETS=$(setup-envtest list --bin-dir /home/runner/.local/kubebuilder -p path | head -1)" >> "$GITHUB_ENV"

      - name: Run tests
        run: make test test-integration

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake pkg-config libssl-dev ca-certificates

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: control-plane/go.mod

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build artifacts
        run: make build

      - name: Install grype for tag builds
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan built image on tag builds
        if: startsWith(github.ref, 'refs/tags/')
        run: make scan-image

      - name: Scan control-plane image on tag builds
        if: startsWith(github.ref, 'refs/tags/')
        run: make scan-control-plane-image

      - name: Push image
        run: make publish-image

      - name: Push control-plane image
        run: make publish-control-plane-image
