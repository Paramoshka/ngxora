name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_REPO: paramoshka/ngxora
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  TAG: ${{ github.ref_name }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake pkg-config libssl-dev ca-certificates

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sdk/go/go.mod

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: make test

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake pkg-config libssl-dev ca-certificates

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sdk/go/go.mod

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build artifacts
        run: make build

      - name: Install grype for tag builds
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan built image on tag builds
        if: startsWith(github.ref, 'refs/tags/')
        run: make scan-image

      - name: Push image
        run: make publish-image
